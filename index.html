<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Capitals Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <header class="header">
    <div class="header-inner">
      <h1>World Capitals Weather</h1>
      <p class="subtitle">Live conditions in major capital cities</p>
    </div>
    <div class="header-actions">
      <button type="button" id="refresh-btn" class="btn" aria-label="Refresh weather data">
        <span class="btn-icon" aria-hidden="true">↻</span>
        Refresh
      </button>
      <p id="last-updated" class="last-updated" aria-live="polite"></p>
    </div>
  </header>

  <main>
    <div id="loading" class="loading" role="status">
      <div class="spinner" aria-hidden="true"></div>
      <p>Loading weather data…</p>
    </div>

    <div id="error" class="error hidden" role="alert">
      <p>Could not load weather data. Check your connection and try again.</p>
      <button type="button" id="retry-btn" class="btn">Try again</button>
    </div>

    <section id="weather-grid" class="weather-grid hidden" aria-label="Weather by capital city"></section>
  </main>

  <footer class="footer">
    <p>Data from <a href="https://open-meteo.com/" target="_blank" rel="noopener noreferrer">Open-Meteo</a></p>
  </footer>

  <dialog id="add-modal" class="modal">
    <form id="add-form" method="dialog">
      <h2>Add a capital</h2>
      <p class="modal-hint">Pick a city below or search for any capital.</p>

      <label class="field-label" for="city-preset">Quick add</label>
      <select id="city-preset" class="field-input">
        <option value="">Choose a capital…</option>
      </select>

      <p class="modal-divider">or search</p>

      <label class="field-label" for="city-search">City name</label>
      <input type="text" id="city-search" class="field-input" placeholder="e.g. Bangkok" autocomplete="off" />

      <p id="add-error" class="add-error hidden" role="alert"></p>

      <div class="modal-actions">
        <button type="button" id="cancel-add" class="btn btn-ghost">Cancel</button>
        <button type="submit" id="confirm-add" class="btn btn-primary">Add city</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
